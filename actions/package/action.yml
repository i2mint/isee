name: "Package"
description: "Package a python project"
inputs:
  distributions:
    description: "List of distributions to build. Provide a comma separated list of 
      distributions. Valid values are sdist, bdist_wheel, bdist_egg, bdist_dumb, 
      bdist_rpm, bdist_wininst, and bdist_msi."
    required: false
    default: "sdist,bdist_wheel"
    
  ssh-private-key:
    description: 'SSH private key to install private packages from source, if any.'
    required: false
    
runs:
  using: 'composite'
  steps:
    - name: Install Dependencies
      uses: i2mint/isee/actions/install-packages@master
      with:
        dependency-files: setup.cfg
        ssh-private-key: ${{ inputs.ssh-private-key }}

    - name: "Build distributions"
      shell: bash
      run: |
        set -e
        python -m pip install --upgrade build
        # Map legacy setup.py distribution names to PEP 517 `build` flags.
        want_sdist=false
        want_wheel=false
        IFS=',' read -ra dists <<< "${{ inputs.distributions }}"
        for d in "${dists[@]}"; do
          d="$(echo "$d" | xargs)"  # trim surrounding whitespace
          case "$d" in
            sdist) want_sdist=true ;;
            bdist_wheel) want_wheel=true ;;
            *) echo "Warning: distribution '$d' is not supported by 'python -m build'; building sdist + wheel instead" ;;
          esac
        done
        build_args=""
        if [ "$want_sdist" = "true" ] && [ "$want_wheel" = "false" ]; then
          build_args="--sdist"
        elif [ "$want_wheel" = "true" ] && [ "$want_sdist" = "false" ]; then
          build_args="--wheel"
        fi
        # No flags => build builds both sdist and wheel (the default distributions).
        echo "Running: python -m build $build_args"
        python -m build $build_args
